<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩემი სიურპრიზი</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffe6f2;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            color: #ff3385;
            margin-top: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            text-align: center;
            padding: 0 10px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 80%;
            max-width: 1000px;
            margin: 40px 0;
        }

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            border: 5px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05) rotate(3deg);
        }

        .timer-section {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            margin-bottom: 100px;
            width: 80%;
            max-width: 600px;
        }

        .timer-section h2 {
            color: #ff3385;
            margin-bottom: 10px;
        }

        .timer-display {
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
        }

        .heart-icon {
            font-size: 3rem;
            color: #ff3385;
            animation: beat 1s infinite;
        }

        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            color: rgba(255, 51, 133, 0.6);
            font-size: 20px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(100vh); }
        }

        /* მუსიკის ღილაკის სტილი */
        #musicBtn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #ff3385;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            z-index: 100;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="hearts" id="heartsContainer"></div>

    <h1>საჩუქარი სპეციალურად შენთვის! ❤️</h1>

    <div class="gallery">
        <img src="photo1.jpg" alt="ფოტო 1">
        <img src="photo2.jpg" alt="ფოტო 2">
        <img src="photo3.jpg" alt="ფოტო 3">
        <img src="photo4.jpg" alt="ფოტო 4">
        <img src="photo5.jpg" alt="ფოტო 5">
        <img src="photo6.jpg" alt="ფოტო 6">
        <img src="photo7.jpg" alt="ფოტო 7">
    </div>

    <div class="timer-section">
        <div class="heart-icon">❤️</div>
        <h2>ჩვენ უკვე ერთად ვართ:</h2>
        <div class="timer-display" id="timer">იტვირთება...</div>
        <p>და ასე იქნება სულ! ✨</p>
    </div>

    <audio id="myAudio" loop>
        <source src="back_to_be_friends.mp3" type="audio/mpeg">
    </audio>
    <button id="musicBtn" onclick="toggleMusic()">🎵 ჩართე მუსიკა</button>

    <script>
        // ტაიმერი (11 მარტიდან)
        const startDate = new Date('March 11, 2024 00:00:00').getTime();

        function updateTimer() {
            const now = new Date().getTime();
            const distance = now - startDate;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = days + " დღე, " + hours + " საათი, " + minutes + " წუთი, " + seconds + " წამი";
        }

        setInterval(updateTimer, 1000);
        updateTimer();

        // მფრინავი გულები
        const heartsContainer = document.getElementById('heartsContainer');
        const heartSymbols = ['❤️', '💖', '💗', '💓', '💕'];

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.opacity = Math.random() * 0.5 + 0.5;
            heartsContainer.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);

        // მუსიკის მართვა
        const audio = document.getElementById("myAudio");
        const btn = document.getElementById("musicBtn");

        function toggleMusic() {
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "⏸️ გააჩერე მუსიკა";
            } else {
                audio.pause();
                btn.innerHTML = "🎵 ჩართე მუსიკა";
            }
        }
    </script>
</body>
</html>
